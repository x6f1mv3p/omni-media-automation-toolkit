<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子交互背景</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>

    <script>
        let scene, camera, renderer, particles;
        let mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        init();
        animate();

        function init() {
            // 1. 创建场景 (Scene)
            scene = new THREE.Scene();

            // 2. 创建相机 (Camera) - 透视相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 1000;

            // 3. 创建粒子几何体
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];

            // 生成 5000 个随机位置和颜色的粒子
            for (let i = 0; i < 5000; i++) {
                // 随机位置 (x, y, z) 在 -1000 到 1000 之间
                positions.push(Math.random() * 2000 - 1000); // x
                positions.push(Math.random() * 2000 - 1000); // y
                positions.push(Math.random() * 2000 - 1000); // z

                // 随机颜色 (r, g, b) 在 0.5 到 1.0 之间，呈现淡色调
                colors.push(Math.random() * 0.5 + 0.5); // r
                colors.push(Math.random() * 0.5 + 0.5); // g
                colors.push(Math.random() * 0.5 + 0.5); // b
            }

            // 将位置和颜色数据添加到几何体
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            // 4. 创建粒子材质 (PointsMaterial)
            const material = new THREE.PointsMaterial({
                size: 4,               // 粒子大小
                vertexColors: true,    // 使用顶点颜色
                blending: THREE.AdditiveBlending, // 混合模式，让叠加处更亮
                transparent: true,     // 透明
                depthTest: false       // 关闭深度测试，防止粒子互相遮挡
            });

            // 5. 创建粒子系统 (Points) 并添加到场景
            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // 6. 创建渲染器 (Renderer)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 7. 添加事件监听
            document.addEventListener('mousemove', onDocumentMouseMove);
            window.addEventListener('resize', onWindowResize);
        }

        // 鼠标移动事件处理
        function onDocumentMouseMove(event) {
            mouseX = event.clientX - windowHalfX;
            mouseY = event.clientY - windowHalfY;
        }

        // 窗口大小调整事件处理
        function onWindowResize() {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            render();
        }

        // 渲染逻辑
        function render() {
            // 让粒子随时间缓慢旋转
            const time = Date.now() * 0.00005;
            particles.rotation.x = time;
            particles.rotation.y = time * 0.5;

            // 让相机位置随鼠标移动而缓慢变化，实现交互感
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position); // 始终看向场景中心

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
